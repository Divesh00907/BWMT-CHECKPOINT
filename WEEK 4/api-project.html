<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Fetcher</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, sans-serif;
            line-height: 1.6;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { margin-bottom: 1rem; }
        #output {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }
        .loading { color: #666; }
        .error { color: #c00; }
        .post {
            background: white;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 4px;
            border-left: 4px solid #0066cc;
        }
        .post h3 { margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <h1>My First API Fetcher</h1>
    <button id="loadBtn">Load Posts</button>
    <div id="output">Click the button to load posts</div>

    <script src="script.js"></script>
</body>
</html>
